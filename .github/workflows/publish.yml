name: Publish to npm
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # Derive version from git tag (strip "v" prefix) so the publish always
      # uses what the tag says, regardless of whether package.json was bumped.
      - name: Sync version to tag
        run: jq ".version = \"${GITHUB_REF_NAME#v}\"" package.json > pkg.tmp && mv pkg.tmp package.json
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
