name: Drift Check
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
  push:
    branches: [master, main]

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check tool drift
        id: check
        run: |
          output=$(./slim-plugin-check 2>&1 || true)
          echo "$output"
          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$output" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Create issue on drift
        if: contains(steps.check.outputs.result, '✗')
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.check.outputs.result }}`
            const body = `## Drift Detected\n\n\`\`\`\n${output}\n\`\`\`\n\nRun \`./slim-plugin-check --diff\` locally for add/remove/publish commands.`;
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: ["drift"],
            });
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: "Tool descriptions drifted from latest opencode",
                body,
                labels: ["drift"],
              });
            }
